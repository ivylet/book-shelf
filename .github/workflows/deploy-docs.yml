name: Deploy my book

on:
  push:
    branches:
      - master  # 只在master上push触发部署
    paths-ignore:   # 下列文件的变更不触发部署，可以自行添加
      - README.md
      - LICENSE

jobs:
  deploy:

    runs-on: ubuntu-latest   # 使用ubuntu系统镜像运行自动化脚本

    steps:  # 自动化步骤
    - uses: actions/checkout@v2   # 第一步，下载代码仓库

    - name: Setup Hugo  # 第二步，安装 hugo
      uses: peaceiris/actions-hugo@v2
      with:
        hugo-version: '0.74.3'  

    - name: Build  # 第三步，编译 hugo
      run: |
        cd ./website 
        hugo -D --minify  

    - name: 上传文件到远程服务器
      uses: zhenyuWang/Upload-File-Action@v1.0.1
      with:
        username: ${{ secrets.SSH_USERNAME }} #远程服务器的登录名
        server: ${{ secrets.SSH_HOST }} #远程服务器的ip地址
        port: "22" #远程服务器的端口
        ssh_private_key: ${{ secrets.secrets.DEPLOY_KEY }} #远程服务器的私钥
        # 要上传文件所在目录
        local_path: "./website/public/*"
        # 远程服务器目标路径
        target_path: "/www/wwwroot/books/leetcode/"